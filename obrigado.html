<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Recebido — SA Enxovais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--ouro:#C9A84C;--ouro-escuro:#9A7730;--escuro-1:#0D0D0D;--escuro-3:#1C1C1C;--escuro-4:#252525;--texto:#E8E0D0;--texto-suave:#A09880;--branco:#F5F0E8;--fonte-titulo:'Cormorant Garamond',serif;--fonte-corpo:'Jost',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--escuro-1);color:var(--texto);font-family:var(--fonte-corpo);line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;-webkit-font-smoothing:antialiased}
    .card{background:var(--escuro-3);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:48px 36px;max-width:540px;width:100%;text-align:center}
    .icone{font-size:3.5rem;margin-bottom:20px;display:block}
    h1{font-family:var(--fonte-titulo);font-size:2.2rem;font-weight:600;color:var(--branco);margin-bottom:10px}
    .subtitulo{color:var(--texto-suave);margin-bottom:32px;font-size:0.95rem}

    /* FIADO */
    .fiado-box{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.25);border-radius:8px;padding:24px;text-align:left;margin-bottom:20px}
    .fiado-box h3{font-family:var(--fonte-titulo);font-size:1.3rem;color:#4ade80;margin-bottom:10px}
    .fiado-box p{font-size:0.875rem;color:var(--texto-suave);line-height:1.7}
    .fiado-box strong{color:var(--texto)}

    /* UPLOAD */
    .secao-upload{margin-bottom:20px}
    .secao-upload h3{font-family:var(--fonte-titulo);font-size:1.2rem;color:var(--ouro);margin-bottom:16px}
    .upload-area{border:2px dashed rgba(201,168,76,0.25);border-radius:8px;padding:28px 20px;margin-bottom:16px;cursor:pointer;transition:all 0.3s ease}
    .upload-area.tem-arquivo{border-color:var(--ouro);background:rgba(201,168,76,0.04)}
    .upload-area input[type="file"]{display:none}
    .upload-label{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
    .upload-label svg{width:36px;height:36px;color:var(--ouro)}
    .upload-label span{font-size:0.9rem;color:var(--texto-suave)}
    .upload-label strong{color:var(--ouro)}
    #preview{width:100%;max-height:200px;object-fit:contain;border-radius:6px;display:none;margin-top:12px}
    #preview.visivel{display:block}

    /* PIX */
    .pix-box{background:var(--escuro-4);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:20px;margin-bottom:20px;text-align:left}
    .pix-label{font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--texto-suave);margin-bottom:8px}
    .pix-chave{font-family:var(--fonte-titulo);font-size:1.1rem;color:var(--ouro);font-weight:600;word-break:break-all}

    /* BOTÕES */
    .btn-enviar{width:100%;padding:14px;border:none;border-radius:6px;font-family:var(--fonte-corpo);font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-enviar.verde{background:#25D366;color:#fff}
    .btn-enviar.verde:disabled{background:#2E2E2E;color:var(--texto-suave);cursor:not-allowed}
    .btn-enviar.verde:not(:disabled):hover{background:#1ebe5d;box-shadow:0 4px 20px rgba(37,211,102,0.3)}
    .btn-enviar.ouro{background:linear-gradient(135deg,var(--ouro),var(--ouro-escuro));color:var(--escuro-1)}
    .btn-enviar.ouro:hover{filter:brightness(1.1)}
    .btn-enviar svg{width:20px;height:20px;flex-shrink:0}

    /* STATUS */
    .sucesso{background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.3);border-radius:8px;padding:16px;margin-top:20px;color:#4ade80;font-size:0.9rem;display:none}
    .sucesso.visivel{display:block}
    .erro-msg{background:rgba(229,115,115,0.1);border:1px solid rgba(229,115,115,0.3);border-radius:8px;padding:12px;margin-bottom:16px;color:#e57373;font-size:0.85rem;display:none}
    .erro-msg.visivel{display:block}
    .carregando{color:var(--texto-suave);font-size:0.85rem;margin-top:12px;display:none}
    .carregando.visivel{display:block}

    @media(max-width:600px){.card{padding:32px 20px}}
  </style>
</head>
<body>
  <div class="card" id="card-conteudo">
    <span class="icone">⏳</span>
    <h1>Carregando...</h1>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCfINR6gs9_I7NXmZriC-9dVrulMYxJuBc",
      authDomain: "sa-enxovais.firebaseapp.com",
      projectId: "sa-enxovais",
      storageBucket: "sa-enxovais.firebasestorage.app",
      messagingSenderId: "781582841209",
      appId: "1:781582841209:web:46548935ef16fa3d216ba8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const WHATSAPP = '5537998217693';
    const params = new URLSearchParams(window.location.search);
    const tipo = params.get('tipo') || 'avista';
    const card = document.getElementById('card-conteudo');

    const wppIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

    function imagemParaBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    if (tipo === 'fiado') {
      card.innerHTML = `
        <span class="icone">✅</span>
        <h1>Pedido recebido!</h1>
        <p class="subtitulo">Obrigado por escolher a <strong style="color:var(--ouro)">SA Enxovais</strong>! Agora envie seu comprovante de residência para confirmar.</p>

        <div class="fiado-box">
          <h3>📋 Compra no Fiado</h3>
          <p>Para liberar sua entrega precisamos de uma foto do seu <strong>comprovante de residência</strong> (conta de luz, água ou telefone recente).</p>
        </div>

        <div class="secao-upload">
          <div class="upload-area" id="upload-area">
            <label class="upload-label" for="input-arquivo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
              <span><strong>Toque aqui</strong> para anexar o comprovante</span>
              <span style="font-size:0.78rem">JPG, PNG ou PDF</span>
            </label>
            <input type="file" id="input-arquivo" accept="image/*,.pdf" />
            <img id="preview" alt="Pré-visualização" />
          </div>
        </div>

        <div class="erro-msg" id="erro-msg">❌ Erro ao salvar. Tente novamente.</div>
        <p class="carregando" id="carregando">⏳ Salvando seus dados...</p>

        <button class="btn-enviar verde" id="btn-enviar" disabled>
          ${wppIcon} Enviar comprovante
        </button>
        <div class="sucesso" id="msg-sucesso">✅ Comprovante enviado com sucesso! Em breve confirmaremos sua entrega.</div>`;

    } else {
      card.innerHTML = `
        <span class="icone">🎉</span>
        <h1>Pedido recebido!</h1>
        <p class="subtitulo">Obrigado por escolher a <strong style="color:var(--ouro)">SA Enxovais</strong>! Faça o PIX e envie o comprovante para confirmar.</p>

        <div class="pix-box">
          <p class="pix-label">Chave PIX</p>
          <div class="pix-chave">bdec1469-e5c6-4f95-af58-7296d0912e32</div>
        </div>

        <div class="secao-upload">
          <div class="upload-area" id="upload-area">
            <label class="upload-label" for="input-arquivo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
              <span><strong>Toque aqui</strong> para anexar o comprovante do PIX</span>
              <span style="font-size:0.78rem">JPG, PNG ou PDF</span>
            </label>
            <input type="file" id="input-arquivo" accept="image/*,.pdf" />
            <img id="preview" alt="Pré-visualização" />
          </div>
        </div>

        <div class="erro-msg" id="erro-msg">❌ Erro ao salvar. Tente novamente.</div>
        <p class="carregando" id="carregando">⏳ Salvando seus dados...</p>

        <button class="btn-enviar verde" id="btn-enviar" disabled>
          ${wppIcon} Enviar comprovante pelo WhatsApp
        </button>
        <div class="sucesso" id="msg-sucesso">✅ Comprovante enviado! Em breve confirmaremos sua entrega.</div>`;
    }

    // ── LÓGICA DO UPLOAD ─────────────────────────────────────
    const input   = document.getElementById('input-arquivo');
    const btn     = document.getElementById('btn-enviar');
    const preview = document.getElementById('preview');
    const area    = document.getElementById('upload-area');
    const sucesso = document.getElementById('msg-sucesso');
    const erroMsg = document.getElementById('erro-msg');
    const loading = document.getElementById('carregando');

    let arquivoSelecionado = null;

    input.addEventListener('change', function() {
      const file = input.files[0];
      if (!file) return;
      arquivoSelecionado = file;
      area.classList.add('tem-arquivo');
      btn.disabled = false;
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => { preview.src = e.target.result; preview.classList.add('visivel'); };
        reader.readAsDataURL(file);
      }
    });

    btn.addEventListener('click', async function() {
      if (!arquivoSelecionado || btn.disabled) return;

      btn.disabled = true;
      erroMsg.classList.remove('visivel');
      loading.classList.add('visivel');

      try {
        // Converte imagem para base64
        let base64 = null;
        if (arquivoSelecionado.type.startsWith('image/')) {
          base64 = await imagemParaBase64(arquivoSelecionado);
        }

        // Pega dados da sessionStorage (passados pelo index.html)
        const dadosPedido = JSON.parse(sessionStorage.getItem('pedido') || '{}');

        // Salva no Firestore
        await addDoc(collection(db, 'pedidos'), {
          tipo: tipo,
          nome: dadosPedido.nome || '',
          telefone: dadosPedido.telefone || '',
          endereco: dadosPedido.endereco || '',
          itens: dadosPedido.itens || '',
          total: dadosPedido.total || '',
          pagamento: dadosPedido.pagamento || '',
          comprovante: base64,
          data: new Date().toISOString()
        });

        loading.classList.remove('visivel');

        // Abre WhatsApp com mensagem
        const msg = tipo === 'fiado'
          ? 'Segue meu comprovante de residência para o pedido - SA Enxovais! 🏠'
          : 'Segue o comprovante do PIX do meu pedido - SA Enxovais! 🧾';

        window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');

        sucesso.classList.add('visivel');
        btn.innerHTML = '✅ Enviado com sucesso!';

      } catch (err) {
        console.error(err);
        loading.classList.remove('visivel');
        erroMsg.classList.add('visivel');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>

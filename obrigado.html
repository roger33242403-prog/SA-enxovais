<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Recebido — SA Enxovais</title>

  <!-- Pixel (deve ficar no <head>) -->
  <script src="js/pixel.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="obrigado-page">
    <div class="obrigado-card">

      <span class="obrigado-icone">🎉</span>

      <h1>Pedido recebido!</h1>
      <p>
        Obrigado por escolher a <strong style="color:var(--ouro)">SA Enxovais</strong>!
        Seu pedido chegou até nós pelo WhatsApp. Para confirmar,
        envie o comprovante do PIX abaixo.
      </p>

      <!-- Chave PIX -->
      <div class="pix-box">
        <p>Chave PIX</p>
        <div class="pix-chave" id="chave-pix">bdec1469-e5c6-4f95-af58-7296d0912e32</div>
      </div>

      <!-- Upload do comprovante -->
      <div class="upload-area" id="upload-area">
        <label class="upload-label" for="input-comprovante">
          <!-- Ícone upload -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          <span><strong>Toque aqui</strong> para anexar o comprovante</span>
          <span style="font-size:0.78rem">JPG, PNG ou PDF</span>
        </label>
        <input
          type="file"
          id="input-comprovante"
          accept="image/*,.pdf"
          aria-label="Selecionar comprovante de pagamento"
        />
        <img id="preview-comprovante" alt="Pré-visualização do comprovante" />
      </div>

      <!-- Botão enviar -->
      <button
        class="btn-enviar-comprovante"
        id="btn-enviar"
        disabled
        aria-disabled="true"
      >
        <!-- WhatsApp icon -->
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Enviar comprovante pelo WhatsApp
      </button>

      <!-- Mensagem de sucesso -->
      <div class="mensagem-sucesso" id="msg-sucesso">
        ✅ Comprovante enviado com sucesso! Em breve entraremos em contato para confirmar a entrega.
      </div>

    </div>
  </div>

  <script>
    const WHATSAPP_NUMERO = '5537998217693';

    const inputArquivo = document.getElementById('input-comprovante');
    const btnEnviar    = document.getElementById('btn-enviar');
    const preview      = document.getElementById('preview-comprovante');
    const uploadArea   = document.getElementById('upload-area');
    const msgSucesso   = document.getElementById('msg-sucesso');

    let arquivoSelecionado = null;

    // Habilita botão quando há arquivo
    inputArquivo.addEventListener('change', () => {
      const arquivo = inputArquivo.files[0];
      if (!arquivo) return;

      arquivoSelecionado = arquivo;
      uploadArea.classList.add('tem-arquivo');
      btnEnviar.disabled = false;
      btnEnviar.setAttribute('aria-disabled', 'false');

      // Preview para imagens
      if (arquivo.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
          preview.classList.add('visivel');
        };
        reader.readAsDataURL(arquivo);
      } else {
        // PDF: mostra ícone de documento
        preview.classList.remove('visivel');
      }
    });

    // Enviar comprovante
    btnEnviar.addEventListener('click', () => {
      if (!arquivoSelecionado) return;

      // 1. Dispara evento Purchase no Meta Pixel
      if (typeof trackPurchase === 'function') trackPurchase();

      // 2. Monta mensagem para WhatsApp
      const mensagem = 'Segue o comprovante do meu pedido - SA Enxovais! 🧾';
      const url = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(mensagem)}`;

      // 3. Abre WhatsApp
      window.open(url, '_blank');

      // 4. Mostra mensagem de sucesso e desabilita botão
      msgSucesso.classList.add('visivel');
      btnEnviar.disabled = true;
      btnEnviar.setAttribute('aria-disabled', 'true');
      btnEnviar.textContent = '✅ Comprovante enviado!';
    });

    // Dispara PageView na chegada
    trackPageView();
  </script>

</body>
</html>
